name: Generate Weekly Blog Post

on:
  schedule:
    - cron: '0 7 * * 1' # Roda semanalmente, toda segunda-feira às 07:00 UTC
  workflow_dispatch: # Permite disparo manual

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai ddgs requests
          
      - name: Run Generation Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BOT_API: ${{ secrets.BOT_API }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/generate.py
        
      - name: Commit and Push Changes
        run: |
          git config --global user.name "PnyxMed Blog Bot"
          git config --global user.email "bot@pnyxmed.com.br"
          git add articles/
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: generate daily medical article"
          git pull --rebase origin main
          git push origin main
